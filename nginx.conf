# nginx.conf — Misconfig Index
#
# misconfig.dev      → serves the static web UI + proxies /api/* to FastAPI
# api.misconfig.dev  → proxies directly to FastAPI (for external API users)
# HTTP               → 301 redirect to HTTPS

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name misconfig.dev www.misconfig.dev api.misconfig.dev;
    return 301 https://$host$request_uri;
}

# ── misconfig.dev — web UI ────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name misconfig.dev www.misconfig.dev;

    ssl_certificate     /etc/letsencrypt/live/misconfig.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/misconfig.dev/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # ── Static frontend ───────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    # Strip the /api prefix before forwarding to FastAPI.
    location /api/ {
        proxy_pass         http://api:8000/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;
    }

    # ── Performance ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        image/svg+xml;

    location ~* \.(css|js)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}

# ── api.misconfig.dev — FastAPI direct ───────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.misconfig.dev;

    ssl_certificate     /etc/letsencrypt/live/misconfig.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/misconfig.dev/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass         http://api:8000/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
