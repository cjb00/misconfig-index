# nginx.conf — Misconfig Index
#
# misconfig.dev      → serves the static web UI + proxies /api/* to FastAPI
# api.misconfig.dev  → proxies directly to FastAPI (for external API users)
# HTTP               → 301 redirect to HTTPS
#
# NOTE: nginx's add_header inheritance rule — if a location block uses ANY
# add_header directive, it inherits NO add_header directives from parent
# contexts. Security headers must therefore be repeated in every location
# that uses add_header (only the css/js cache location in this file).

# ── Rate limiting zones (http context via conf.d include) ─────────────────────
# scan_zone  — tightly limits the expensive Quick Scan endpoint
# api_zone   — general API flood protection
# conn_zone  — simultaneous connection cap per IP
limit_req_zone  $binary_remote_addr  zone=scan_zone:10m  rate=8r/m;
limit_req_zone  $binary_remote_addr  zone=api_zone:10m   rate=120r/m;
limit_conn_zone $binary_remote_addr  zone=conn_zone:10m;

# Hide nginx version from Server header and error pages
server_tokens off;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name misconfig.dev www.misconfig.dev api.misconfig.dev;
    return 301 https://$host$request_uri;
}

# ── misconfig.dev — web UI ────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name misconfig.dev www.misconfig.dev;

    ssl_certificate     /etc/letsencrypt/live/misconfig.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/misconfig.dev/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Max 30 simultaneous connections per IP; reject bodies > 10 MB
    limit_conn conn_zone 30;
    client_max_body_size 10m;

    # ── Static frontend ───────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Default: no caching for HTML pages
    expires -1;

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Drop exploit scanner probes for PHP/ASP/CGI — return nothing
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 444;
    }

    # Drop probes for sensitive files and common attack paths
    location ~* ^/(\.env|\.git|\.htaccess|\.htpasswd|wp-admin|wp-login|phpmyadmin|admin|xmlrpc) {
        return 444;
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    # Tighter limit for the expensive scan endpoint
    location /api/reports/scan {
        limit_req zone=scan_zone burst=3 nodelay;

        proxy_pass         http://api:8000/reports/scan;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  90s;
        proxy_send_timeout  90s;
        proxy_connect_timeout 10s;
    }

    # General API — strip the /api prefix before forwarding to FastAPI.
    location /api/ {
        limit_req zone=api_zone burst=30 nodelay;

        proxy_pass         http://api:8000/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;
    }

    # ── Performance ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        image/svg+xml;

    # CSS/JS: long cache — add_header here overrides parent, so ALL security
    # headers must be explicitly repeated in this block.
    location ~* \.(css|js)$ {
        expires 1h;
        add_header Cache-Control                "public, max-age=3600"                                                  always;
        add_header X-Frame-Options              "DENY"                                                                  always;
        add_header X-Content-Type-Options       "nosniff"                                                               always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin"                                       always;
        add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains; preload"                          always;
        add_header Permissions-Policy           "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
        add_header Content-Security-Policy      "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.misconfig.dev; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://api.misconfig.dev" always;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    # Applied to all locations that do NOT use add_header (i.e. everything
    # except the css/js block above, which repeats them explicitly).
    add_header X-Frame-Options           "DENY"                                                                  always;
    add_header X-Content-Type-Options    "nosniff"                                                               always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"                                       always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"                          always;
    add_header Permissions-Policy        "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"        always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.misconfig.dev; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://api.misconfig.dev" always;
}

# ── api.misconfig.dev — FastAPI direct ───────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.misconfig.dev;

    ssl_certificate     /etc/letsencrypt/live/misconfig.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/misconfig.dev/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Max 30 simultaneous connections per IP; reject bodies > 10 MB
    limit_conn conn_zone 30;
    client_max_body_size 10m;

    # Drop exploit scanner probes
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 444;
    }
    location ~* ^/(\.env|\.git|\.htaccess|\.htpasswd|wp-admin|wp-login|phpmyadmin|admin|xmlrpc) {
        return 444;
    }

    # Stripe webhook must NOT be rate-limited (Stripe retries on failure)
    location /billing/webhook {
        proxy_pass         http://api:8000/billing/webhook;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
        proxy_connect_timeout 10s;
    }

    # Tighter limit for the expensive scan endpoint
    location /reports/scan {
        limit_req zone=scan_zone burst=3 nodelay;

        proxy_pass         http://api:8000/reports/scan;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  90s;
        proxy_send_timeout  90s;
        proxy_connect_timeout 10s;
    }

    # General API traffic
    location / {
        limit_req zone=api_zone burst=30 nodelay;

        proxy_pass         http://api:8000/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    # CSP is permissive for the API domain: Swagger UI loads from jsdelivr CDN
    add_header X-Frame-Options           "DENY"                                                                  always;
    add_header X-Content-Type-Options    "nosniff"                                                               always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"                                       always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"                          always;
    add_header Permissions-Policy        "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"        always;
    add_header Content-Security-Policy   "default-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; img-src 'self' data: https:; connect-src 'self' https://api.misconfig.dev; frame-ancestors 'none'" always;
}
