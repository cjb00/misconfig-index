# docker-compose.yml — Misconfig Index
#
# Services:
#   db   — PostgreSQL 16 (persistent volume)
#   api  — FastAPI backend (built from Dockerfile)
#   web  — nginx: serves static UI, proxies /api/* → FastAPI, terminates SSL

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-misconfig}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-misconfig_index}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-misconfig} -d ${POSTGRES_DB:-misconfig_index}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    environment:
      DATABASE_URL:         postgresql://${POSTGRES_USER:-misconfig}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-misconfig_index}
      ENVIRONMENT:          ${ENVIRONMENT:-production}
      CORS_ORIGINS:         ${CORS_ORIGINS:-*}
      API_WORKERS:          ${API_WORKERS:-2}
      GITHUB_CLIENT_ID:       ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET:   ${GITHUB_CLIENT_SECRET:-}
      JWT_SECRET:             ${JWT_SECRET:-change-me-in-production}
      API_URL:                ${API_URL:-https://api.misconfig.dev}
      FRONTEND_URL:           ${FRONTEND_URL:-https://misconfig.dev}
      STRIPE_SECRET_KEY:      ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET:  ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRO_PRICE_ID:    ${STRIPE_PRO_PRICE_ID:-}
    volumes:
      - ./backend:/app/backend:ro
      - ./scanner:/app/scanner:ro
    # Port 8000 is intentionally NOT published to the host in production —
    # nginx reaches the API over the internal Docker network.

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  pgdata:
