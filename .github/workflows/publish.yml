# Publishes misconfig-index to PyPI when a version tag is pushed.
#
# Setup (one-time):
#   1. Create a PyPI account at https://pypi.org
#   2. Go to PyPI → Account Settings → Publishing → Add a new publisher
#      - PyPI project name : misconfig-index
#      - Owner             : cjb00  (your GitHub username)
#      - Repository        : misconfig-index
#      - Workflow name     : publish.yml
#      - Environment name  : pypi
#   3. Create a GitHub environment named "pypi" in repo Settings → Environments
#
# Trigger:
#   git tag v0.2.0 && git push origin v0.2.0
#
# The tag version must match [project].version in pyproject.toml.

name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write   # Required for OIDC trusted-publisher auth

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publisher — no API token needed.
        # See: https://docs.pypi.org/trusted-publishers/
