# Misconfig Index — IaC Security Scoring
# ----------------------------------------
# Scans Terraform and Kubernetes files on every push and PR,
# posts results to Misconfig Index, and comments the score on PRs.
#
# Setup:
#   1. Get an API key from https://misconfig.dev  (or your self-hosted instance)
#   2. Add it as a repo secret:  Settings → Secrets → MISCONFIG_API_KEY
#   3. Copy this file to .github/workflows/misconfig-index.yml
#
# Optional: set MIN_SCORE below to fail the check if score drops too low.

name: Misconfig Index

on:
  push:
    branches: ["main", "master"]
    paths:
      - "**.tf"
      - "**.yaml"
      - "**.yml"
      - "**/Dockerfile"
  pull_request:
    paths:
      - "**.tf"
      - "**.yaml"
      - "**.yml"
      - "**/Dockerfile"
  workflow_dispatch:   # allows manual trigger from GitHub Actions UI

env:
  MISCONFIG_API_URL: https://api.misconfig.dev   # change if self-hosting
  MIN_SCORE: 60                                  # fail below this (set to 0 to disable)

jobs:
  scan:
    name: IaC Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Misconfig Index scanner
        run: pip install "misconfig-index[server]"

      - name: Scan IaC
        id: scan
        run: |
          python -m scanner.ci_ingest \
            --path . \
            --repo "github.com/${{ github.repository }}" \
            --branch "${{ github.ref_name }}" \
            --commit "${{ github.sha }}" \
            --min-score ${{ env.MIN_SCORE }}
        env:
          MISCONFIG_API_KEY: ${{ secrets.MISCONFIG_API_KEY }}
          MISCONFIG_API_URL: ${{ env.MISCONFIG_API_URL }}
